<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poema</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="icon" href="favicon.ico">
</head>
<body>

  <main class="hero">
    <div class="overlay"></div>

   <section class="contenido">

  <h1>Igual a mí</h1>

  <input type="text" id="titulo" placeholder="Título del poema...">

  <textarea id="poema" placeholder="Escribe tu poema..."></textarea>

  <div class="acciones">
    <button onclick="guardarPoema()">Publicar</button>
    <button id="descargar">Descargar</button>
    <button id="compartir">Compartir</button>
  </div>

</section>

<section class="blog">
  <h2>📜 Poemas publicados</h2>
  <div id="lista"></div>
</section>

   <script src="script.js"></script>
   <script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } 
  from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "TU_DOMINIO",
    projectId: "TU_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.db = db;
  window.firebaseTools = { collection, addDoc, getDocs, deleteDoc, doc, updateDoc };
</script>
</body>
</html>
