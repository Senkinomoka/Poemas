<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevSpace | Comunidad de Programación</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<main class="app">

  <!-- HEADER -->
  <header class="topbar">
    <h1>DevSpace</h1>
    <p class="tagline">
      Comparte código, ideas y soluciones con la comunidad de ingeniería de sistemas.
    </p>
  </header>

  <!-- BOTÓN DISCORD -->
  <a href="https://discord.gg/2JPevwbE" target="_blank" class="discord-btn">
    🚀 Unirse al Discord
  </a>

  <!-- EDITOR -->
  <section class="editor glass">

    <input type="text" id="titulo" placeholder="Título del tema o problema...">

    <select id="categoria">
      <option value="">Selecciona categoría</option>
      <option>JavaScript</option>
      <option>Python</option>
      <option>Java</option>
      <option>C++</option>
      <option>Web</option>
      <option>Base de Datos</option>
      <option>Otro</option>
    </select>

    <textarea id="contenido" placeholder="Escribe tu código, duda o aporte..."></textarea>

    <div class="acciones">
      <button onclick="guardarPost()">Publicar</button>
      <button id="descargar">Descargar</button>
    </div>

  </section>

  <!-- FEED -->
  <section class="feed">
    <h2>💻 Publicaciones recientes</h2>
    <div id="lista"></div>
  </section>

</main>

<!-- TOAST -->
<div id="toast">Publicado 🚀</div>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
