<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Poema</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="hero">
    <div class="overlay"></div>

    <section class="contenido">
      <h1>Igual a mí</h1>
      
      <input type="text" id="titulo" placeholder="Título de tu poema...">
      <textarea id="poema" placeholder="Escribe tu poema aquí..."></textarea>

      <div class="info">
        <span id="contador">0 palabras | 0 líneas</span>
      </div>

      <button id="descargar">Descargar poema</button>
      <button id="compartir">Compartir</button>
    </section>
  </main>

   <script src="script.js"></script>
</body>
</html>
